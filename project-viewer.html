<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando... | Sanbai Dashboard</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --orange: #F76B1C; --ink: #1C1C1C; --bg: #F5F6F8; --card: #FFFFFF;
      --success: #16A34A; --muted: #667085;
    }
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--ink); margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .card { background: var(--card); padding: 24px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    header { display: flex; justify-content: space-between; align-items: center; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .kpi-card { background: #f9fafb; padding: 15px; border-radius: 12px; border-left: 4px solid var(--orange); }
    .kpi-label { font-size: 0.85rem; color: var(--muted); font-weight: 600; }
    .kpi-value { font-size: 1.25rem; font-weight: 800; color: var(--ink); }
    .scope-list { list-style: none; padding: 0; }
    .scope-list li { padding: 8px 0; border-bottom: 1px solid #edf2f7; display: flex; gap: 10px; }
    .loading-state { text-align: center; padding: 100px; }
    .hidden { display: none; }
    @media print { .no-print { display: none; } body { background: white; padding: 0; } .card { box-shadow: none; border: 1px solid #eee; } }
  </style>
</head>
<body>
  <div id="loader" class="loading-state">
    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--orange)"></i>
    <p>Cargando información segura de Sanbai...</p>
  </div>

  <div id="viewer" class="container hidden">
    <header class="card">
      <div>
        <h1 id="pName" style="margin:0"></h1>
        <p id="pSubtitle" style="color:var(--muted); margin:5px 0 0"></p>
      </div>
      <button onclick="window.print()" class="no-print" style="padding:10px 20px; border-radius:8px; border:none; background:var(--ink); color:white; cursor:pointer;">
        <i class="fas fa-file-pdf"></i> Exportar
      </button>
    </header>

    <div class="card">
      <h3><i class="fas fa-flag" style="color:var(--orange)"></i> Objetivo del Proyecto</h3>
      <p id="pObjective" style="line-height:1.6"></p>
    </div>

    <div class="card">
      <h3><i class="fas fa-chart-line" style="color:var(--orange)"></i> Indicadores Clave (KPIs)</h3>
      <div id="pKpis" class="kpi-grid"></div>
    </div>

    <div class="card">
      <h3><i class="fas fa-list-check" style="color:var(--orange)"></i> Alcance y Entregables</h3>
      <ul id="pScope" class="scope-list"></ul>
    </div>
  </div>

<script>
  let booting = false;

  async function getCurrentUserOrPrompt() {
    const user = netlifyIdentity.currentUser();
    if (user) return user;

    if (!sessionStorage.getItem("identity_prompt_open")) {
      sessionStorage.setItem("identity_prompt_open", "1");
      netlifyIdentity.open();
    }
    throw new Error("LOGIN_REQUIRED");
  }

  async function bootstrap() {
    if (booting) return;
    booting = true;

    try {
      const key = new URLSearchParams(window.location.search).get("key");
      if (!key) throw new Error("Falta el parámetro key");

      const user = await getCurrentUserOrPrompt();
      const token = await user.jwt();

      const res = await fetch(`/.netlify/functions/presentation-data?type=project&key=${encodeURIComponent(key)}`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        throw new Error(data?.error || "Proyecto no encontrado");
      }

      render(data);
    } catch (e) {
      if (e.message === "LOGIN_REQUIRED") return;

      console.error(e);
      document.getElementById("loader").innerHTML = `
        <i class="fas fa-exclamation-triangle fa-2x" style="color: var(--orange)"></i>
        <p style="margin-top:15px">${e.message}</p>
      `;
    } finally {
      booting = false;
    }
  }

  function render(d) {
    document.getElementById("loader").classList.add("hidden");
    document.getElementById("viewer").classList.remove("hidden");

    document.title = d.name || "Proyecto";
    document.getElementById("pName").innerText = d.name || "";
    document.getElementById("pSubtitle").innerText = d.subtitle || "";
    document.getElementById("pObjective").innerText = d.objective || "";

    document.getElementById("pKpis").innerHTML = (d.kpis || []).map(k => `
      <div class="kpi-card">
        <div class="kpi-label">${k.label || ""}</div>
        <div class="kpi-value">${k.value || ""}</div>
      </div>
    `).join("");

    document.getElementById("pScope").innerHTML = (d.scope || []).map(s => `
      <li><i class="fas fa-check-circle" style="color:var(--success)"></i> ${s}</li>
    `).join("");
  }

  netlifyIdentity.on("init", () => {
    bootstrap();
    renderHero(data.hero);
renderMeta(data.meta);
renderKpis(data.kpis);
renderSections(data.sections);
  });

  netlifyIdentity.on("login", () => {
    sessionStorage.removeItem("identity_prompt_open");
    netlifyIdentity.close();
    bootstrap();
  });

  netlifyIdentity.on("logout", () => {
    sessionStorage.removeItem("identity_prompt_open");
    location.href = "/login.html";
  });

  function renderHero(hero) {

document.getElementById("pName").innerText = hero?.title || "";
document.getElementById("pSubtitle").innerText = hero?.subtitle || "";

if(hero?.badge){
document.getElementById("pBadge").innerText = hero.badge;
}

}

  function renderMeta(meta){

const el = document.getElementById("metaGrid");

el.innerHTML = meta.map(m=>`
<div class="meta-card">
<div class="meta-label">${m.label}</div>
<div class="meta-value">${m.value}</div>
${m.sub ? `<div class="meta-sub">${m.sub}</div>`:''}
</div>
`).join('');

}

  function renderKpis(kpis){

const el = document.getElementById("kpiGrid");

el.innerHTML = kpis.map(k=>`
<div class="kpi-card">
<div class="kpi-label">${k.label}</div>
<div class="kpi-value">${k.value}</div>
</div>
`).join('');

}
  function renderSections(sections){

const container = document.getElementById("sections");

container.innerHTML = sections.map(section=>{

if(section.type==="bullets"){

return `
<section class="viewer-section">
<h2>${section.title}</h2>

<ul class="bullet-list">
${section.items.map(i=>`
<li>
<strong>${i.title}</strong>
<p>${i.text}</p>
</li>
`).join("")}
</ul>

</section>
`;

}

if(section.type==="table"){

return `
<section class="viewer-section">

<h2>${section.title}</h2>

<table class="viewer-table">

<thead>
<tr>
${section.columns.map(c=>`<th>${c}</th>`).join("")}
</tr>
</thead>

<tbody>
${section.rows.map(r=>`
<tr>
${r.map(c=>`<td>${c}</td>`).join("")}
</tr>
`).join("")}
</tbody>

</table>

</section>
`;

}

}).join("");

}

  
</script>
</body>
</html>
