<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cargando Proyecto...</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <div id="app">Cargando datos seguros...</div>

    <script>
        async function loadProject() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('key');
            
            // Obtener el token de Netlify Identity
            const user = netlifyIdentity.currentUser();
            if (!user) {
                window.location.href = "/login.html";
                return;
            }
            const token = await user.jwt();

            try {
                const res = await fetch(`/.netlify/functions/presentation-data?type=project&key=${key}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                
                if (res.status === 200) {
                    const data = await res.json();
                    renderProject(data);
                } else {
                    document.getElementById('app').innerHTML = "<h1>Acceso Denegado</h1>";
                }
            } catch (err) {
                console.error("Error cargando proyecto:", err);
            }
        }

        function renderProject(data) {
            document.title = data.name;
            document.getElementById('app').innerHTML = `
                <div class="header"><h1>${data.name}</h1></div>
                `;
        }

        netlifyIdentity.on('init', user => { if (!user) netlifyIdentity.open(); else loadProject(); });
    </script>
</body>
</html>
