<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cargando Proyecto...</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
<body>
  <div id="app">
    <h1 id="project-title">Cargando...</h1>
    <div id="content"></div>
  </div>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const key = params.get('key');
      
      const response = await fetch(`/.netlify/functions/presentation-data?type=project&key=${key}`);
      const data = await response.json();

      // Renderizado dinámico
      document.title = data.Name;
      document.getElementById('project-title').textContent = data.Name;
      document.getElementById('content').innerHTML = `
        <p><strong>Estado:</strong> ${data.Status}</p>
        <p><strong>Cliente:</strong> ${data.Client}</p>
        `;
    }
    init();
  </script>
</body>
</html>
