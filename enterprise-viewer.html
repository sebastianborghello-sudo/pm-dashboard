<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanbai · Enterprise Control Tower</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{
      --orange:#F76B1C;
      --bg:#0B1020;
      --card:#161B2D;
      --text:#FFFFFF;
      --muted:#94A3B8;
      --border:rgba(255,255,255,0.08);
    }
    body{
      font-family:'Segoe UI',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      padding:20px;
      line-height:1.5;
    }
    .container{max-width:1200px;margin:0 auto;}
    .header{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border);
    }
    .user-zone{display:flex;align-items:center;gap:15px;}
    .btn-logout{
      background:transparent;border:1px solid var(--muted);color:var(--muted);
      padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.8rem;
    }
    .btn-logout:hover{color:white;border-color:white;}
    .hero{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:28px;
      margin-bottom:24px;
    }
    .hero h1{margin:0 0 8px;font-size:2rem;}
    .hero p{margin:0;color:var(--muted);}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;}
    .card{
      background:var(--card);
      padding:24px;
      border-radius:18px;
      border:1px solid var(--border);
      margin-bottom:24px;
    }
    .section-title{margin:0 0 18px;font-size:1.1rem;}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
    .kpi-card{
      background:rgba(255,255,255,0.02);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
    }
    .kpi-label{color:var(--muted);font-size:.85rem;margin-bottom:8px;}
    .kpi-value{font-size:2rem;font-weight:800;color:var(--orange);}
    .kpi-note{margin-top:6px;color:var(--muted);font-size:.85rem;}
    .project-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:16px 0;border-bottom:1px solid var(--border);cursor:pointer;
    }
    .project-row:last-child{border-bottom:none;}
    .project-info h4{margin:0;}
    .project-info p{margin:4px 0 0;color:var(--muted);font-size:.9rem;}
    .project-value{text-align:right;font-weight:700;}
    .bucket{
      display:block;
      color:var(--muted);
      font-size:.8rem;
      margin-top:4px;
    }
    .bullet-list{margin:0;padding-left:18px;color:var(--muted);}
    .bullet-list li{margin-bottom:10px;}
    .goal-card,.opportunity-card,.complexity-item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
      background:rgba(255,255,255,0.02);
      margin-bottom:12px;
    }
    .complexity-item{
      display:flex;justify-content:space-between;align-items:center;
    }
    .loading-overlay{
      position:fixed;inset:0;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:100;transition:.5s;
    }
    .hidden{opacity:0;pointer-events:none;}
    @media (max-width:700px){
      .header{flex-direction:column;gap:20px;text-align:center;}
    }
  </style>
</head>
<body>
  <div id="loader" class="loading-overlay">
    <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--orange)"></i>
    <p style="margin-top:20px; letter-spacing: 1px;">SINCRONIZANDO ENTERPRISE...</p>
  </div>

  <div id="app" class="container hidden">
    <header class="header">
      <div>
        <h2 style="margin:0;">Sanbai <span style="color:var(--orange);font-weight:300;">Control Tower</span></h2>
      </div>
      <div class="user-zone">
        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
      </div>
    </header>

    <section class="hero">
      <h1 id="heroTitle"></h1>
      <p id="heroSubtitle"></p>
      <p id="heroSummary" style="margin-top:12px;"></p>
    </section>

    <section class="card">
      <h3 class="section-title">KPIs ejecutivos</h3>
      <div id="kpiGrid" class="kpi-grid"></div>
    </section>

    <section class="card">
      <h3 class="section-title">Portafolio de proyectos</h3>
      <div id="projectList"></div>
    </section>

    <section class="grid">
      <div class="card">
        <h3 class="section-title">Bloqueadores</h3>
        <ul id="blockers" class="bullet-list"></ul>
      </div>

      <div class="card">
        <h3 class="section-title">Objetivos de corto plazo</h3>
        <div id="goals"></div>
      </div>
    </section>

    <section class="card">
      <h3 class="section-title">Oportunidades</h3>
      <div id="opportunities"></div>
    </section>

    <section class="grid">
      <div class="card">
        <h3 class="section-title">Complejidad LAN</h3>
        <div id="lanComplexity"></div>
      </div>
      <div class="card">
        <h3 class="section-title">Complejidad SD-WAN</h3>
        <div id="sdwanComplexity"></div>
      </div>
      <div class="card">
        <h3 class="section-title">Complejidad Storage</h3>
        <div id="storageComplexity"></div>
      </div>
    </section>
  </div>

  <script>
    let booting = false;

    async function getCurrentUserOrPrompt() {
      const user = netlifyIdentity.currentUser();
      if (user) return user;

      if (!sessionStorage.getItem("identity_prompt_open")) {
        sessionStorage.setItem("identity_prompt_open", "1");
        netlifyIdentity.open();
      }
      throw new Error("LOGIN_REQUIRED");
    }

    async function bootstrap() {
      if (booting) return;
      booting = true;

      try {
        const user = await getCurrentUserOrPrompt();
        const token = await user.jwt();

        const res = await fetch('/.netlify/functions/presentation-data?type=enterprise', {
          headers: { Authorization: `Bearer ${token}` }
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data?.error || "Error en la respuesta del servidor");
        }

        render(data);
      } catch (e) {
        if (e.message === "LOGIN_REQUIRED") return;

        console.error("Fetch error:", e);
        document.getElementById('loader').innerHTML = `
          <i class="fas fa-exclamation-triangle fa-2x" style="color:var(--orange)"></i>
          <p style="margin-top:15px">Error al cargar datos. ${e.message}</p>
          <button onclick="location.reload()" style="margin-top:10px; background:var(--orange); color:white; border:none; padding:8px 16px; border-radius:5px; cursor:pointer">Reintentar</button>
        `;
      } finally {
        booting = false;
      }
    }

    function renderHero(hero = {}) {
      document.getElementById("heroTitle").innerText = hero.title || "";
      document.getElementById("heroSubtitle").innerText = hero.subtitle || "";
      document.getElementById("heroSummary").innerText = hero.summary || "";
    }

    function renderKpis(kpis = []) {
      const el = document.getElementById("kpiGrid");
      el.innerHTML = kpis.map(k => `
        <div class="kpi-card">
          <div class="kpi-label">${k.label || ""}</div>
          <div class="kpi-value">${k.value || ""}</div>
          <div class="kpi-note">${k.note || ""}</div>
        </div>
      `).join("");
    }

    function renderProjects(projects = []) {
      const el = document.getElementById("projectList");
      el.innerHTML = projects.map(p => `
        <div class="project-row" onclick="window.location.href='/project-viewer.html?key=${encodeURIComponent(p.link)}'">
          <div class="project-info">
            <h4>${p.name || ""}</h4>
            <p>${p.status || ""}</p>
          </div>
          <div class="project-value">
            ${p.value || ""}
            <span class="bucket">${p.bucket || ""}</span>
          </div>
        </div>
      `).join("");
    }

    function renderBlockers(items = []) {
      const el = document.getElementById("blockers");
      el.innerHTML = items.map(i => `<li>${i}</li>`).join("");
    }

    function renderGoals(goals = []) {
      const el = document.getElementById("goals");
      el.innerHTML = goals.map(g => `
        <div class="goal-card">
          <h4>${g.decision || ""}</h4>
          <p><strong>Motivo:</strong> ${g.why || ""}</p>
          <p><strong>Resultado esperado:</strong> ${g.output || ""}</p>
        </div>
      `).join("");
    }

    function renderOpportunities(list = []) {
      const el = document.getElementById("opportunities");
      el.innerHTML = list.map(o => `
        <div class="opportunity-card">
          <h4>${o.name || ""}</h4>
          <div class="kpi-value" style="font-size:1.4rem">${o.value || ""}</div>
          <p>${o.description || ""}</p>
        </div>
      `).join("");
    }

    function renderComplexityBlock(id, data = []) {
      const el = document.getElementById(id);
      el.innerHTML = data.map(d => `
        <div class="complexity-item">
          <span>${d.label || ""}</span>
          <strong>${d.value || ""}</strong>
        </div>
      `).join("");
    }

    function renderComplexity(c = {}) {
      renderComplexityBlock("lanComplexity", c.lan || []);
      renderComplexityBlock("sdwanComplexity", c.sdwan || []);
      renderComplexityBlock("storageComplexity", c.storage || []);
    }

    function render(data) {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');

      renderHero(data.hero);
      renderKpis(data.kpis);
      renderProjects(data.projects);
      renderBlockers(data.blockers);
      renderGoals(data.short_term_goals);
      renderOpportunities(data.opportunities);
      renderComplexity(data.complexity);
    }

    function logout() {
      sessionStorage.removeItem("identity_prompt_open");
      netlifyIdentity.logout();
    }

    netlifyIdentity.on("init", () => bootstrap());
    netlifyIdentity.on("login", () => {
      sessionStorage.removeItem("identity_prompt_open");
      netlifyIdentity.close();
      bootstrap();
    });
    netlifyIdentity.on("logout", () => {
      sessionStorage.removeItem("identity_prompt_open");
      location.href = "/login.html";
    });
  </script>
</body>
</html>
