<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Sanbai PM</title>
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f6f8; display:grid; place-items:center; min-height:100vh; }
    .card { background:#fff; padding:32px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.08); width:min(420px,90vw); text-align:center; }
    button { background:#1c1c1c; color:#fff; border:none; padding:12px 18px; border-radius:10px; cursor:pointer; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sanbai PM</h1>
    <p>Acceso restringido. Iniciá sesión para continuar.</p>
    <button id="btnLogin">Iniciar sesión</button>
  </div>

<script>
  // Función para inicializar los eventos una vez que Netlify Identity esté listo
  function initIdentity() {
    const btn = document.getElementById("btnLogin");
    
    btn.addEventListener("click", () => {
      window.netlifyIdentity.open();
    });

    // Evento Init: Si ya está logueado, lo mandamos directo al dashboard
    window.netlifyIdentity.on("init", user => {
      if (user) {
        window.location.href = "/enterprise-viewer.html";
      }
    });

    // Evento Login: Al loguearse con éxito
    window.netlifyIdentity.on("login", (user) => {
      window.netlifyIdentity.close();
      
      // Verificación de seguridad de Roles
      const roles = user?.app_metadata?.roles || [];
      if (roles.length === 0) {
        alert("Aviso: Tu usuario no tiene roles asignados. Contactá al administrador en Netlify.");
      }
      
      window.location.href = "/enterprise-viewer.html";
    });
  }

  // Verificamos si la librería ya cargó, si no, esperamos un poco
  if (window.netlifyIdentity) {
    initIdentity();
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      // Un pequeño retraso para asegurar que el script 'defer' se ejecutó
      setTimeout(initIdentity, 500);
    });
  }
</script>
</body>
</html>
