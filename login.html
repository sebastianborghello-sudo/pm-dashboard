<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login | Sanbai PM</title>
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f6f8; display:grid; place-items:center; min-height:100vh; }
    .card { background:#fff; padding:32px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,.08); width:min(420px,90vw); text-align:center; }
    button { background:#1c1c1c; color:#fff; border:none; padding:12px 18px; border-radius:10px; cursor:pointer; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sanbai PM</h1>
    <p>Acceso restringido. Iniciá sesión para continuar.</p>
    <button id="btnLogin">Iniciar sesión</button>
  </div>

<script>
  function handleAuth(user) {
    if (user) {
      console.log("Sesión activa:", user.email);
      // Esperamos a que Netlify Identity asiente la cookie en el navegador
      setTimeout(() => {
        window.location.replace("/enterprise-viewer.html");
      }, 1000);
    }
  }

  function init() {
    const user = window.netlifyIdentity.currentUser();
    if (user) handleAuth(user);

    window.netlifyIdentity.on("login", user => {
      window.netlifyIdentity.close();
      handleAuth(user);
    });

    document.getElementById("btnLogin").addEventListener("click", () => {
      window.netlifyIdentity.open();
    });
  }

  if (window.netlifyIdentity) {
    init();
  } else {
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(init, 500);
    });
  }
</script>
</body>
</html>
