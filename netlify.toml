[build]
  publish = "."
  functions = "netlify/functions"

# 1. PERMITIR ASSETS Y FUNCIONES (Esto rompe el loop)
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200

# 2. REDIRECCIONES DE VISUALIZACIÓN
[[redirects]]
  from = "/"
  to = "/enterprise-viewer.html"
  status = 200
  force = true
  # condiciones comentadas temporalmente para asegurar acceso
  # conditions = {Role = ["pm_admin", "pm_viewer"]}

[[redirects]]
  from = "/project-viewer"
  to = "/project-viewer.html"
  status = 200
  force = true

# 3. FALLBACK SEGURO (Solo para páginas HTML, no para todo)
[[redirects]]
  from = "/enterprise-viewer.html"
  to = "/login.html"
  status = 302
  force = false

[[redirects]]
  from = "/project-viewer.html"
  to = "/login.html"
  status = 302
  force = false
