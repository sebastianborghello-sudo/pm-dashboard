[build]
  publish = "."
  functions = "netlify/functions"

# 1. Asegurar acceso a scripts y funciones (Vital para evitar el loop)
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200

# 2. Redirección de la raíz al Viewer Global
[[redirects]]
  from = "/"
  to = "/enterprise-viewer.html"
  status = 200
  force = true

# 3. Reglas de acceso por Rol (Sin redirecciones 302 aquí)
[[redirects]]
  from = "/enterprise-viewer.html"
  to = "/enterprise-viewer.html"
  status = 200
  conditions = {Role = ["pm_admin", "pm_viewer"]}

[[redirects]]
  from = "/project-viewer.html"
  to = "/project-viewer.html"
  status = 200
  conditions = {Role = ["pm_admin", "pm_editor", "pm_viewer"]}

# 4. Fallback final: Si después de todo no tiene acceso, al login.
# IMPORTANTE: force = false permite que si el archivo existe y el usuario tiene acceso, se muestre.
[[redirects]]
  from = "/*"
  to = "/login.html"
  status = 302
  force = false
