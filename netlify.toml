[build]
  publish = "."
  functions = "netlify/functions"

# 1. PERMITIR ASSETS Y FUNCIONES (Vital para evitar el loop)
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200

# 2. REDIRECCIÓN DE RAÍZ
[[redirects]]
  from = "/"
  to = "/enterprise-viewer.html"
  status = 200
  force = true

# 3. REGLAS DE ACCESO POR ROL (Sin force=true para evitar rebotes falsos)
[[redirects]]
  from = "/enterprise-viewer.html"
  to = "/enterprise-viewer.html"
  status = 200
  conditions = {Role = ["pm_admin", "pm_viewer"]}

[[redirects]]
  from = "/project-viewer.html"
  to = "/project-viewer.html"
  status = 200
  conditions = {Role = ["pm_admin", "pm_editor", "pm_viewer"]}

# 4. FALLBACK: Si no tiene el rol anterior, mandarlo al login
# Usamos force = false para que no atrape peticiones de scripts internos
[[redirects]]
  from = "/*"
  to = "/login.html"
  status = 302
  force = false
